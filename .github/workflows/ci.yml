
name: Integración Continua (CI) - LV API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Descargar codigo de Github
      uses: actions/checkout@v4

    - name: 2. Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 3. Restaurar dependencias de la Solución
      run: dotnet restore

    - name: 4. Compilar el proyecto
      run: dotnet build -c Release --no-restore

    - name: 5. Ejecutar Pruebas unitarias (xUnit)
      run: dotnet test -c Release --no-build --verbosity normal

publish-docker:
  needs: build-and-test
  runs-on: ubuntu-latest

  steps:
    - name: 1. Descargar código
      uses: actions/checkout@v4

    - name: 2. Iniciar sesion en GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 3. Construir y subir imagen Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        file: LarrainVial.POrtafolios.Api/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/lv-api:latest